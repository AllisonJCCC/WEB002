<!DOCTYPE html>
<html>
  <head>
    <title>Website Feedback Form</title>
    <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,300,300italic,400italic,600' rel='stylesheet' type='text/css'>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700" rel="stylesheet">
    <style>
      html, body {
      min-height: 80%;
      }
      body, div, form, input, p { 
      padding: 0;
      margin: 0;
      outline: none;
      font-family: Roboto, Arial, sans-serif;
      line-height: 22px;
      }
      h1 {
      font-weight: 400;
         
      }
      .testbox {
      display: flex;
      justify-content: center;
      align-items: center;
      height: inherit;
      padding: 3px;
      }
      form {
      width: 90%;
      padding: 20px;
      background: #fff;
      box-shadow: 0 2px 5px #ccc; 
      }
      input {
      width: calc(100% - 10px);
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 3px;
      vertical-align: middle;
      }
      input:hover, textarea:hover {
      outline: none;
      border: 3px solid #095484;
      }
      th, td {
      width: 28%;
      padding: 15px 0;
      border-bottom: 1px solid #ccc;
      text-align: center;
      vertical-align: unset;
      line-height: 18px;
      font-weight: 400;
      word-break: break-all;
      }
      .first-col {
      width: 16%;
      text-align: left;
      }
      textarea:hover {
      outline: none;
      border: 3px solid #1c87c9;
      }
      table {
      width: 90%;
      
      }
      textarea {
      width: calc(100% - 6px);
      }
      .question {
      padding: 15px 0 5px;
      color: #095484;
      }
      .question-answer label {
      display: block;
      padding: 0 20px 10px 0;
      }
      .question-answer input {
      width: auto;
      }
      .btn-block {
      margin-top: 20px;
      text-align: center;
      }
      button {
      width: 150px;
      padding: 10px;
      border: none;
      -webkit-border-radius: 5px; 
      -moz-border-radius: 5px; 
      border-radius: 5px; 
      background-color: #095484;
      font-size: 16px;
      color: #fff;
      cursor: pointer;
      }
      button:hover {
      background-color: #0666a3;
      }
      @media (min-width: 568px) {
      th, td {
      word-break: keep-all;
      }
      }
    </style>
  </head>
  <body>
    <div class="testbox">
      <form method="post" action="https://webdevbasics.net/scripts/pacific.php">
        <h1>Questions for you</h1>
           <div class="question-answer">
          <label for= "fname">First Name:</label> <input type="text" id="fname" name="fname" placeholder="Your first name" /> 
          <label for ="lname">Last Name:</label><input type="text" id="lname" name="lname"placeholder="Your last name"  /> 
        </div> <br>
        <label for="email">Enter your email address:</label>
          <input style="width:25%;" type="email" id="email" name="email"><br><br>
          
          <label for="pwd">Create a password:</label>
            <input style="width:25%;" type="password" id="pwd" name="pwd"><br><br>
          
            <label for="today">How are you feeling today?(between 0 and 10):</label>
            <input style="width:25%;" type="range" id="today" name="today" min="0" max="10">
          
          <p class="question">What did you do this weekend?</p>
        <textarea rows="5"></textarea>
        <p class="question">Do you like pets?</p>
        <div class="question-answer">
          <label><input type="radio" value="yes" name="pets" /> yes</label>
          <label><input type="radio" value="no" name="pets" /> no</label>
        </div>
   <p class="question">What is your favorite kind of pet?</p>
        <div class="question-answer">
          <label><input type="radio" value="cat" name="favorite" /> Cat</label>
          <label><input type="radio" value="dog" name="favorite" />Dog</label>
          <label><input type="radio" value="fish" name="favorite" /> Fish</label>
          <label><input type="radio" value="lizard" name="favorite" /> Lizard</label>
          <label><input type="radio" value="none" name="favorite" /> None of these</label>
        </div>
        <p class="question">What advice would you give someone just starting college? What does someone need to know before their first semester?</p>
        <textarea rows="5"></textarea>
        
        <p class="question">Do you like these fruits? </p>
        <div class="question-answer">
				 <label for="fruit">Choose a fruit:</label>
		<select id="fruit" name="fruit" size="4" multiple>
		  <option value="apple">Apple</option>
		  <option value="orange">Orange</option>
		  <option value="banana">Banana</option>
		  <option value="strawberries">Strawberries</option>
		</select>
        </div>
          <p class="question">When is your birthday?</p>
         <label for="birthday">Birthday:</label>
          
  <input style="width:10%;" type="date" id="birthday" name="birthday"><br>
         <label for="favcolor">Select your favorite color:</label>
            <input style="width:10%;" type="color" id="favcolor" name="favcolor" value="#ff0000"><br><br>
          
            <label for="points">Pick a number between 1-5:</label>
  <input  style="width:10%;" type="number" id="points" name="number" max="5">
        <div class="btn-block">
          <button type="submit" href="/">Send</button>   <button type="reset" href="/">Reset</button>
        </div>
      </form>
    </div>
  </body>
</html>
